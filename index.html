<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>brap.fun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            cursor: none; /* Hides default cursor */
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            display: flex;
            gap: 0.15em;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .slot {
            color: #d0d0d0;
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.85;
            transition: opacity 0.4s ease, text-shadow 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .slot:hover {
            opacity: 1;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .slam-glow {
            animation: glow 0.3s ease-out;
        }

        .bg-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 80%);
            pointer-events: none;
            animation: subtlePulse 10s infinite ease-in-out;
        }

        @keyframes subtlePulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.03); opacity: 0.9; }
        }

        @keyframes spinLoop {
            0% { transform: translateY(0); }
            50% { transform: translateY(-1em); }
            100% { transform: translateY(0); }
        }

        @keyframes glow {
            0% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
            100% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.1); }
        }

        .scrambling {
            animation: spinLoop 0.48s ease-in-out infinite;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            animation: fall 1s ease-out forwards;
            z-index: 0;
        }

        @keyframes fall {
            0% { opacity: 0.8; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(50px) rotate(360deg); }
        }

        @media (max-width: 768px) {
            .slot {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-effect"></div>
    <div class="container">
        <span class="slot" id="slot1">brap</span>
        <span class="slot" id="slot2">.</span>
        <span class="slot" id="slot3">fun</span>
    </div>

    <script>
        const slots = [
            { element: document.getElementById('slot1'), original: 'brap', options: ['brap', 'snap', 'trap', 'clap', 'zap', 'flip'] },
            { element: document.getElementById('slot2'), original: '.', options: ['.', '-', '_', '*', '+', '.'] },
            { element: document.getElementById('slot3'), original: 'fun', options: ['fun', 'run', 'fin', 'sun', 'gun', 'win'] }
        ];

        function scramble() {
            slots.forEach(slot => {
                slot.element.classList.add('scrambling');
                let scrambleCount = 0;
                const maxScrambles = 6;

                const scrambleInterval = setInterval(() => {
                    if (scrambleCount >= maxScrambles) {
                        clearInterval(scrambleInterval);
                        slot.element.textContent = slot.original;
                        slot.element.classList.remove('scrambling');
                        slot.element.classList.add('slam-glow');
                        setTimeout(() => slot.element.classList.remove('slam-glow'), 300); // Remove glow after animation
                        return;
                    }

                    const randomOption = slot.options[Math.floor(Math.random() * slot.options.length)];
                    slot.element.textContent = randomOption;
                    scrambleCount++;
                }, 80);
            });
        }

        // First scramble after 3s, then every 5-10s
        setTimeout(() => {
            scramble();
            setInterval(scramble, Math.random() * 5000 + 5000);
        }, 3000);

        // Mouse trail with falling stars
        document.addEventListener('mousemove', (e) => {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${e.pageX - 2}px`; // Center the star on cursor
            star.style.top = `${e.pageY - 2}px`;
            document.body.appendChild(star);

            // Randomize size slightly for variety
            const size = Math.random() * 2 + 2; // 2-4px
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;

            // Remove star after animation
            setTimeout(() => star.remove(), 1000);
        });
    </script>
</body>
</html>
